name: golangci-lint
on:
  push:
    tags:
      - v*
    branches:
      - develop
      - main
  pull_request:
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        env:
          GOLANGCI_LINT_CACHE: /tmp/golangci-lint
        with:
          version: latest
          args: --timeout=5m
          skip-cache: true
