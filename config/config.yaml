    retry:
      max_attempts: 3
      backoff_initial: 100ms
      backoff_multiplier: 2.0
      idempotent_only: true

  foundry-svc:
    base_url: "https://foundry.stawi.dev"
    timeout: 30s
    pagination:
      style: offset
      page_param: page
      size_param: page_size
    circuit_breaker:
      failure_threshold: 5
      success_threshold: 2
      timeout: 60s
    retry:
      max_attempts: 2
      backoff_initial: 200ms
      backoff_multiplier: 2.0
      idempotent_only: true

capability:
  evaluator: static
  static_policy_file: config/policies.yaml
  cache:
    ttl: 5m
    max_entries: 10000

workflow:
  enabled: true
  store:
    driver: postgres
    dsn_env: WORKFLOW_DSN
  timeout_check_interval: 60s

idempotency:
  enabled: true
  store:
    driver: memory

search:
  timeout_per_provider: 3s
  max_results_per_provider: 50

lookup:
  cache:
    ttl: 5m
    max_entries: 1000

ui:
  dir: ""

observability:
  log_level: info
  tracing:
    enabled: true
    exporter: otlp
    endpoint: "http://otel-collector:4317"
    sampling_rate: 0.1
  metrics:
    enabled: true
    path: /metrics
