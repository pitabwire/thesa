domain: ledger
version: "1.0.0"

navigation:
  label: Accounting
  icon: account_balance
  order: 9
  capabilities:
    - "ledger:view"
  children:
    - label: Accounts
      icon: account_balance_wallet
      route: /ledger/accounts
      page_id: ledger.accounts
      capabilities:
        - "ledger:view"
      order: 1
    - label: Transactions
      icon: swap_horiz
      route: /ledger/transactions
      page_id: ledger.transactions
      capabilities:
        - "ledger:view"
      order: 2

pages:
  - id: ledger.accounts
    title: Accounts
    route: /ledger/accounts
    layout: table
    capabilities:
      - "ledger:view"
    breadcrumb:
      - label: Home
        route: /
      - label: Accounting
        route: /ledger/accounts
      - label: Accounts
        route: /ledger/accounts
    table:
      data_source:
        operation_id: listAccounts
        service_id: ledger-svc
        mapping:
          items_path: data
      columns:
        - field: name
          label: Name
          type: text
          sortable: true
          link:
            route: /ledger/accounts/{id}
            params:
              id: id
        - field: type
          label: Type
          type: badge
          sortable: true
          status_map:
            ASSET: info
            LIABILITY: warning
            EQUITY: success
            REVENUE: success
            EXPENSE: error
        - field: currency
          label: Currency
          type: text
          sortable: true
        - field: balance
          label: Balance
          type: currency
          sortable: true
        - field: state
          label: State
          type: badge
          sortable: true
          status_map:
            ACTIVE: success
            CREATED: info
            FROZEN: warning
            CLOSED: error
      filters:
        - field: type
          label: Type
          type: select
          options:
            static:
              - label: Asset
                value: ASSET
              - label: Liability
                value: LIABILITY
              - label: Equity
                value: EQUITY
              - label: Revenue
                value: REVENUE
              - label: Expense
                value: EXPENSE
        - field: state
          label: State
          type: select
          options:
            static:
              - label: Active
                value: ACTIVE
              - label: Frozen
                value: FROZEN
              - label: Closed
                value: CLOSED
      default_sort: name
      sort_dir: asc
      page_size: 25
    actions:
      - id: create_account
        label: Create Account
        icon: add
        style: primary
        type: form
        form_id: ledger.create_account_form
        capabilities:
          - "ledger:create"

  - id: ledger.transactions
    title: Transactions
    route: /ledger/transactions
    layout: table
    capabilities:
      - "ledger:view"
    breadcrumb:
      - label: Home
        route: /
      - label: Accounting
        route: /ledger/accounts
      - label: Transactions
        route: /ledger/transactions
    table:
      data_source:
        operation_id: listTransactions
        service_id: ledger-svc
        mapping:
          items_path: data
      columns:
        - field: reference
          label: Reference
          type: text
          sortable: true
        - field: debit_account
          label: Debit Account
          type: text
        - field: credit_account
          label: Credit Account
          type: text
        - field: amount
          label: Amount
          type: currency
          sortable: true
        - field: currency
          label: Currency
          type: text
        - field: description
          label: Description
          type: text
        - field: status
          label: Status
          type: badge
          sortable: true
          status_map:
            POSTED: success
            PENDING: warning
            REVERSED: error
        - field: created_at
          label: Created
          type: datetime
          sortable: true
      filters:
        - field: status
          label: Status
          type: select
          options:
            static:
              - label: Posted
                value: POSTED
              - label: Pending
                value: PENDING
              - label: Reversed
                value: REVERSED
        - field: created_at
          label: Created Date
          type: date_range
      row_actions:
        - id: reverse_transaction
          label: Reverse
          icon: undo
          style: danger
          type: command
          command_id: ledger.reverseTransaction
          capabilities:
            - "ledger:reverse"
          confirmation:
            title: Reverse Transaction
            message: "Are you sure you want to reverse this transaction?"
            confirm: Reverse
            cancel: Cancel
            style: danger
          conditions:
            - field: status
              operator: eq
              value: POSTED
              effect: show
      default_sort: created_at
      sort_dir: desc
      page_size: 25
    actions:
      - id: create_transaction
        label: Create Transaction
        icon: add
        style: primary
        type: form
        form_id: ledger.create_transaction_form
        capabilities:
          - "ledger:create"

  - id: ledger.account_detail
    title: "Account: {name}"
    route: /ledger/accounts/{id}
    layout: detail
    capabilities:
      - "ledger:view"
    breadcrumb:
      - label: Home
        route: /
      - label: Accounting
        route: /ledger/accounts
      - label: Accounts
        route: /ledger/accounts
      - label: "{name}"
        route: /ledger/accounts/{id}
    sections:
      - id: info
        title: Account Information
        layout: grid
        columns: 2
        fields:
          - field: id
            label: ID
            type: text
            read_only: true
          - field: name
            label: Name
            type: text
            read_only: true
          - field: type
            label: Type
            type: badge
            read_only: true
          - field: currency
            label: Currency
            type: text
            read_only: true
          - field: balance
            label: Balance
            type: currency
            read_only: true
          - field: state
            label: State
            type: badge
            read_only: true
forms:
  - id: ledger.create_account_form
    title: Create Account
    capabilities:
      - "ledger:create"
    submit_command: ledger.createAccount
    success_route: /ledger/accounts
    success_message: Account created successfully.
    sections:
      - id: details
        title: Account Details
        layout: grid
        columns: 2
        fields:
          - field: name
            label: Account Name
            type: text
            required: true
            validation:
              min_length: 2
              max_length: 100
          - field: type
            label: Account Type
            type: select
            required: true
            lookup:
              static:
                - label: Asset
                  value: ASSET
                - label: Liability
                  value: LIABILITY
                - label: Equity
                  value: EQUITY
                - label: Revenue
                  value: REVENUE
                - label: Expense
                  value: EXPENSE
          - field: currency
            label: Currency
            type: text
            required: true
            validation:
              min_length: 3
              max_length: 3
            placeholder: "e.g. KES, USD"

  - id: ledger.create_transaction_form
    title: Create Transaction
    capabilities:
      - "ledger:create"
    submit_command: ledger.createTransaction
    success_route: /ledger/transactions
    success_message: Transaction created successfully.
    sections:
      - id: details
        title: Transaction Details
        layout: grid
        columns: 2
        fields:
          - field: debit_account_id
            label: Debit Account
            type: reference
            required: true
            lookup:
              operation_id: listAccounts
              service_id: ledger-svc
              label_field: name
              value_field: id
          - field: credit_account_id
            label: Credit Account
            type: reference
            required: true
            lookup:
              operation_id: listAccounts
              service_id: ledger-svc
              label_field: name
              value_field: id
          - field: amount
            label: Amount
            type: number
            required: true
            validation:
              min: 0.01
          - field: currency
            label: Currency
            type: text
            required: true
            validation:
              min_length: 3
              max_length: 3
          - field: description
            label: Description
            type: textarea
            placeholder: "Transaction description"
          - field: reference
            label: Reference
            type: text
            placeholder: "External reference"

commands:
  - id: ledger.createAccount
    capabilities:
      - "ledger:create"
    operation:
      type: openapi
      operation_id: createAccount
      service_id: ledger-svc
    input:
      body_mapping: projection
      field_projection:
        data.name: input.name
        data.type: input.type
        data.currency: input.currency
    output:
      type: full

  - id: ledger.createTransaction
    capabilities:
      - "ledger:create"
    operation:
      type: openapi
      operation_id: createTransaction
      service_id: ledger-svc
    input:
      body_mapping: projection
      field_projection:
        data.debit_account_id: input.debit_account_id
        data.credit_account_id: input.credit_account_id
        data.amount: input.amount
        data.currency: input.currency
        data.description: input.description
        data.reference: input.reference
    output:
      type: full

  - id: ledger.reverseTransaction
    capabilities:
      - "ledger:reverse"
    operation:
      type: openapi
      operation_id: reverseTransaction
      service_id: ledger-svc
    input:
      body_mapping: projection
      field_projection:
        id: input.id
    output:
      type: full

searches:
  - id: ledger.accounts_search
    domain: accounts
    capabilities:
      - "ledger:view"
    operation:
      type: openapi
      operation_id: listAccounts
      service_id: ledger-svc
    result_mapping:
      items_path: data
      title_field: name
      subtitle_field: type
      id_field: id
      route: "/ledger/accounts/{id}"
    weight: 0.7
    max_results: 10

  - id: ledger.transactions_search
    domain: transactions
    capabilities:
      - "ledger:view"
    operation:
      type: openapi
      operation_id: listTransactions
      service_id: ledger-svc
    result_mapping:
      items_path: data
      title_field: reference
      subtitle_field: description
      id_field: id
      route: "/ledger/transactions/{id}"
    weight: 0.6
    max_results: 10
