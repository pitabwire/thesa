domain: payments
version: "1.0.0"

navigation:
  label: Payments
  icon: payments
  order: 6
  capabilities:
    - "payments:view"
  children:
    - label: All Payments
      icon: receipt_long
      route: /payments
      page_id: payments.list
      capabilities:
        - "payments:view"
      order: 1
    - label: Payment Links
      icon: link
      route: /payment-links
      page_id: payment-links.list
      capabilities:
        - "payments:view"
      order: 2

pages:
  - id: payments.list
    title: Payments
    route: /payments
    layout: table
    capabilities:
      - "payments:view"
    breadcrumb:
      - label: Home
        route: /
      - label: Payments
        route: /payments
    table:
      data_source:
        operation_id: listPayments
        service_id: payment-svc
        mapping:
          items_path: data
      columns:
        - field: amount
          label: Amount
          type: currency
          sortable: true
          link:
            route: /payments/{id}
            params:
              id: id
        - field: currency
          label: Currency
          type: text
          sortable: true
        - field: payer
          label: Payer
          type: text
          sortable: true
        - field: payee
          label: Payee
          type: text
          sortable: true
        - field: route
          label: Route
          type: badge
          sortable: true
          status_map:
            MPESA: success
            CARD: info
            BANK: info
            CRYPTO: warning
        - field: state
          label: State
          type: badge
          sortable: true
          status_map:
            ACTIVE: success
            CREATED: info
            INACTIVE: warning
            DELETED: error
        - field: status
          label: Status
          type: badge
          sortable: true
          status_map:
            COMPLETED: success
            PENDING: warning
            FAILED: error
            PROCESSING: info
            REVERSED: error
      filters:
        - field: status
          label: Status
          type: select
          options:
            static:
              - label: Completed
                value: COMPLETED
              - label: Pending
                value: PENDING
              - label: Failed
                value: FAILED
              - label: Processing
                value: PROCESSING
        - field: route
          label: Route
          type: select
          options:
            static:
              - label: M-Pesa
                value: MPESA
              - label: Card
                value: CARD
              - label: Bank
                value: BANK
      default_sort: created_at
      sort_dir: desc
      page_size: 25
    actions:
      - id: create_payment
        label: Create Payment
        icon: add
        style: primary
        type: form
        form_id: payments.create_form
        capabilities:
          - "payments:create"

  - id: payments.detail
    title: "Payment Detail"
    route: /payments/{id}
    layout: detail
    capabilities:
      - "payments:view"
    breadcrumb:
      - label: Home
        route: /
      - label: Payments
        route: /payments
      - label: Detail
        route: /payments/{id}
    sections:
      - id: info
        title: Payment Information
        layout: grid
        columns: 2
        fields:
          - field: id
            label: ID
            type: text
            read_only: true
          - field: amount
            label: Amount
            type: currency
            read_only: true
          - field: currency
            label: Currency
            type: text
            read_only: true
          - field: payer
            label: Payer
            type: text
            read_only: true
          - field: payee
            label: Payee
            type: text
            read_only: true
          - field: route
            label: Route
            type: badge
            read_only: true
          - field: reference
            label: Reference
            type: text
            read_only: true
          - field: status
            label: Status
            type: badge
            read_only: true
          - field: state
            label: State
            type: badge
            read_only: true
          - field: created_at
            label: Created
            type: datetime
            read_only: true

  - id: payment-links.list
    title: Payment Links
    route: /payment-links
    layout: table
    capabilities:
      - "payments:view"
    breadcrumb:
      - label: Home
        route: /
      - label: Payments
        route: /payments
      - label: Payment Links
        route: /payment-links
    table:
      data_source:
        operation_id: listPaymentLinks
        service_id: payment-svc
        mapping:
          items_path: data
      columns:
        - field: amount
          label: Amount
          type: currency
          sortable: true
        - field: currency
          label: Currency
          type: text
        - field: description
          label: Description
          type: text
        - field: url
          label: Link URL
          type: text
        - field: status
          label: Status
          type: badge
          sortable: true
          status_map:
            ACTIVE: success
            EXPIRED: warning
            USED: info
      default_sort: created_at
      sort_dir: desc
      page_size: 25
    actions:
      - id: create_payment_link
        label: Create Payment Link
        icon: add_link
        style: primary
        type: form
        form_id: payment-links.create_form
        capabilities:
          - "payments:create"

forms:
  - id: payments.create_form
    title: Create Payment
    capabilities:
      - "payments:create"
    submit_command: payments.create
    success_route: /payments
    success_message: Payment created successfully.
    sections:
      - id: details
        title: Payment Details
        layout: grid
        columns: 2
        fields:
          - field: amount
            label: Amount
            type: number
            required: true
            validation:
              min: 0.01
          - field: currency
            label: Currency
            type: text
            required: true
            validation:
              min_length: 3
              max_length: 3
            placeholder: "e.g. KES, USD"
          - field: payer_id
            label: Payer
            type: text
            required: true
          - field: payee_id
            label: Payee
            type: text
            required: true
          - field: route
            label: Payment Route
            type: select
            required: true
            lookup:
              static:
                - label: M-Pesa
                  value: MPESA
                - label: Card
                  value: CARD
                - label: Bank Transfer
                  value: BANK
          - field: reference
            label: Reference
            type: text
            placeholder: "External reference or invoice number"

  - id: payment-links.create_form
    title: Create Payment Link
    capabilities:
      - "payments:create"
    submit_command: payment-links.create
    success_route: /payment-links
    success_message: Payment link created successfully.
    sections:
      - id: details
        title: Payment Link Details
        layout: grid
        columns: 1
        fields:
          - field: amount
            label: Amount
            type: number
            required: true
            validation:
              min: 0.01
          - field: currency
            label: Currency
            type: text
            required: true
            validation:
              min_length: 3
              max_length: 3
            placeholder: "e.g. KES, USD"
          - field: description
            label: Description
            type: textarea
            required: true
            validation:
              max_length: 500

commands:
  - id: payments.create
    capabilities:
      - "payments:create"
    operation:
      type: openapi
      operation_id: createPayment
      service_id: payment-svc
    input:
      body_mapping: projection
      field_projection:
        data.amount: input.amount
        data.currency: input.currency
        data.payer_id: input.payer_id
        data.payee_id: input.payee_id
        data.route: input.route
        data.reference: input.reference
    output:
      type: full

  - id: payment-links.create
    capabilities:
      - "payments:create"
    operation:
      type: openapi
      operation_id: createPaymentLink
      service_id: payment-svc
    input:
      body_mapping: projection
      field_projection:
        data.amount: input.amount
        data.currency: input.currency
        data.description: input.description
    output:
      type: full

searches:
  - id: payments.search
    domain: payments
    capabilities:
      - "payments:view"
    operation:
      type: openapi
      operation_id: listPayments
      service_id: payment-svc
    result_mapping:
      items_path: data
      title_field: reference
      subtitle_field: amount
      id_field: id
      route: "/payments/{id}"
    weight: 0.8
    max_results: 10
