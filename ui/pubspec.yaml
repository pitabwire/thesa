name: thesa_ui
description: >-
  A generic, dynamic Flutter frontend that renders enterprise admin interfaces
  entirely from backend (BFF) descriptors. Contains zero hardcoded domain knowledge.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod 3.x with code generation
  flutter_riverpod: ^3.2.1
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Local Database - Drift (SQLite)
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.4
  path: ^1.9.0

  # Routing and Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.2
  retrofit: ^4.9.2

  # Data Models - Immutability and JSON
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Form Management
  reactive_forms: ^18.2.2
  reactive_forms_annotations: ^8.0.1

  # Data Tables
  data_table_2: ^2.5.22

  # Responsive Layout
  flutter_adaptive_scaffold: ^0.3.3+1

  # Security - Token Storage & OIDC
  flutter_secure_storage: ^10.0.0
  openid_client: ^0.4.9+1

  # Platform-specific auth (deep links, URL launcher)
  app_links: ^7.0.0
  url_launcher: ^6.3.2

  # Connectivity Detection
  connectivity_plus: ^7.0.0

  # Environment Configuration
  flutter_dotenv: ^6.0.0

  # Logging and Telemetry
  logging: ^1.2.0
  logger: ^2.5.0

  # Platform info
  package_info_plus: ^8.1.3

  # Preferences
  shared_preferences: ^2.3.0

  # Web platform support
  web: ^1.1.0

  # Shimmer effect for loading skeletons
  shimmer: ^3.0.0

  # UI Utilities
  intl: ^0.20.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Theme - Stawi Theme (BoundaryML-inspired design system)
  stawi_theme:
    path: packages/stawi_theme
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0

  # Linting
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.production
